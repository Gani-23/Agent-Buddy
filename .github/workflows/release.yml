name: Build and रिलीज़ (Windows + macOS)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish (win-x64)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          dotnet publish -c Release -r win-x64 --self-contained true `
            -p:Version=$version -p:AssemblyVersion=$version.0 -p:FileVersion=$version.0 -p:InformationalVersion=$version

      - name: Zip artifact
        shell: pwsh
        run: |
          $publishDir = "bin/Release/net10.0/win-x64/publish"
          $zipName = "AgentBuddy-win-x64.zip"
          if (Test-Path $zipName) { Remove-Item $zipName }
          Compress-Archive -Path "$publishDir\\*" -DestinationPath $zipName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentBuddy-win-x64
          path: AgentBuddy-win-x64.zip

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish (osx-arm64)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet publish -c Release -r osx-arm64 --self-contained true \
            -p:Version="$VERSION" -p:AssemblyVersion="$VERSION.0" -p:FileVersion="$VERSION.0" -p:InformationalVersion="$VERSION"

      - name: Build .app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP_NAME="AgentBuddy"
          APP_DIR="$APP_NAME.app"
          PUBLISH_DIR="bin/Release/net10.0/osx-arm64/publish"

          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources"
          cp "$PUBLISH_DIR/AgentBuddy" "$APP_DIR/Contents/MacOS/AgentBuddy"
          chmod +x "$APP_DIR/Contents/MacOS/AgentBuddy"

          cat > "$APP_DIR/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>AgentBuddy</string>
            <key>CFBundleDisplayName</key>
            <string>AgentBuddy</string>
            <key>CFBundleIdentifier</key>
            <string>com.gani.agentbuddy</string>
            <key>CFBundleExecutable</key>
            <string>AgentBuddy</string>
            <key>CFBundleIconFile</key>
            <string>AgentBuddy</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleVersion</key>
            <string>$VERSION</string>
            <key>CFBundleShortVersionString</key>
            <string>$VERSION</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

          # Build icon from Assets/AgentBuddy.ico (if present)
          if [ -f "Assets/AgentBuddy.ico" ]; then
            ICON_PNG="/tmp/AgentBuddy.png"
            ICONSET="/tmp/AgentBuddy.iconset"
            sips -s format png "Assets/AgentBuddy.ico" --out "$ICON_PNG"
            mkdir -p "$ICONSET"
            sips -z 16 16   "$ICON_PNG" --out "$ICONSET/icon_16x16.png"
            sips -z 32 32   "$ICON_PNG" --out "$ICONSET/icon_16x16@2x.png"
            sips -z 32 32   "$ICON_PNG" --out "$ICONSET/icon_32x32.png"
            sips -z 64 64   "$ICON_PNG" --out "$ICONSET/icon_32x32@2x.png"
            sips -z 128 128 "$ICON_PNG" --out "$ICONSET/icon_128x128.png"
            sips -z 256 256 "$ICON_PNG" --out "$ICONSET/icon_128x128@2x.png"
            sips -z 256 256 "$ICON_PNG" --out "$ICONSET/icon_256x256.png"
            sips -z 512 512 "$ICON_PNG" --out "$ICONSET/icon_256x256@2x.png"
            sips -z 512 512 "$ICON_PNG" --out "$ICONSET/icon_512x512.png"
            sips -z 1024 1024 "$ICON_PNG" --out "$ICONSET/icon_512x512@2x.png"
            iconutil -c icns "$ICONSET" -o "$APP_DIR/Contents/Resources/AgentBuddy.icns"
          fi

      - name: Zip artifact
        run: |
          ZIP_NAME="AgentBuddy-macos-arm64.zip"
          ditto -c -k --sequesterRsrc --keepParent "AgentBuddy.app" "$ZIP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentBuddy-macos-arm64
          path: AgentBuddy-macos-arm64.zip

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/AgentBuddy-win-x64/AgentBuddy-win-x64.zip
            dist/AgentBuddy-macos-arm64/AgentBuddy-macos-arm64.zip
