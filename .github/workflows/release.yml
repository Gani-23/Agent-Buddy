name: Build and रिलीज़ (Windows + macOS + Linux)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-windows:
    name: Build Windows (${{ matrix.rid }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-x86]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $rid = "${{ matrix.rid }}"
          dotnet publish -c Release -r $rid --self-contained true `
            -p:Version=$version -p:AssemblyVersion=$version.0 -p:FileVersion=$version.0 -p:InformationalVersion=$version

      - name: Sign Windows executable (optional)
        if: ${{ secrets.WINDOWS_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $rid = "${{ matrix.rid }}"
          $exePath = "bin/Release/net10.0/$rid/publish/AgentBuddy.exe"
          if (-not (Test-Path $exePath)) { throw "Executable not found: $exePath" }
          $pfxPath = "$env:RUNNER_TEMP\\agentbuddy-signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String("${{ secrets.WINDOWS_PFX_BASE64 }}"))
          $password = "${{ secrets.WINDOWS_PFX_PASSWORD }}"
          signtool sign /f $pfxPath /p $password /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exePath

      - name: Zip artifact
        shell: pwsh
        run: |
          $rid = "${{ matrix.rid }}"
          $publishDir = "bin/Release/net10.0/$rid/publish"
          $zipName = "AgentBuddy-$rid.zip"
          if (Test-Path $zipName) { Remove-Item $zipName }
          Compress-Archive -Path "$publishDir\\*" -DestinationPath $zipName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentBuddy-${{ matrix.rid }}
          path: AgentBuddy-${{ matrix.rid }}.zip

  build-macos:
    name: Build macOS (${{ matrix.rid }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [osx-arm64, osx-x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RID="${{ matrix.rid }}"
          dotnet publish -c Release -r "$RID" --self-contained true \
            -p:Version="$VERSION" -p:AssemblyVersion="$VERSION.0" -p:FileVersion="$VERSION.0" -p:InformationalVersion="$VERSION"

      - name: Build .app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RID="${{ matrix.rid }}"
          APP_NAME="AgentBuddy"
          APP_DIR="$APP_NAME.app"
          PUBLISH_DIR="bin/Release/net10.0/$RID/publish"

          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources"
          cp "$PUBLISH_DIR/AgentBuddy" "$APP_DIR/Contents/MacOS/AgentBuddy"
          chmod +x "$APP_DIR/Contents/MacOS/AgentBuddy"

          cat > "$APP_DIR/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>AgentBuddy</string>
            <key>CFBundleDisplayName</key>
            <string>AgentBuddy</string>
            <key>CFBundleIdentifier</key>
            <string>com.gani.agentbuddy</string>
            <key>CFBundleExecutable</key>
            <string>AgentBuddy</string>
            <key>CFBundleIconFile</key>
            <string>AgentBuddy</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleVersion</key>
            <string>$VERSION</string>
            <key>CFBundleShortVersionString</key>
            <string>$VERSION</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

          # Build icon from Assets/AgentBuddy.ico (if present)
          if [ -f "Assets/AgentBuddy.ico" ]; then
            ICON_PNG="/tmp/AgentBuddy.png"
            ICONSET="/tmp/AgentBuddy.iconset"
            sips -s format png "Assets/AgentBuddy.ico" --out "$ICON_PNG"
            mkdir -p "$ICONSET"
            sips -z 16 16   "$ICON_PNG" --out "$ICONSET/icon_16x16.png"
            sips -z 32 32   "$ICON_PNG" --out "$ICONSET/icon_16x16@2x.png"
            sips -z 32 32   "$ICON_PNG" --out "$ICONSET/icon_32x32.png"
            sips -z 64 64   "$ICON_PNG" --out "$ICONSET/icon_32x32@2x.png"
            sips -z 128 128 "$ICON_PNG" --out "$ICONSET/icon_128x128.png"
            sips -z 256 256 "$ICON_PNG" --out "$ICONSET/icon_128x128@2x.png"
            sips -z 256 256 "$ICON_PNG" --out "$ICONSET/icon_256x256.png"
            sips -z 512 512 "$ICON_PNG" --out "$ICONSET/icon_256x256@2x.png"
            sips -z 512 512 "$ICON_PNG" --out "$ICONSET/icon_512x512.png"
            sips -z 1024 1024 "$ICON_PNG" --out "$ICONSET/icon_512x512@2x.png"
            iconutil -c icns "$ICONSET" -o "$APP_DIR/Contents/Resources/AgentBuddy.icns"
          fi

      - name: Import signing certificate (optional)
        if: ${{ secrets.MAC_CERT_P12_BASE64 != '' }}
        run: |
          CERT_PATH="$RUNNER_TEMP/agentbuddy_signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/agentbuddy.keychain-db"
          KEYCHAIN_PASSWORD="agentbuddy-temp"
          echo "${{ secrets.MAC_CERT_P12_BASE64 }}" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 21600 -u "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "${{ secrets.MAC_CERT_PASSWORD }}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -p codesigning "$KEYCHAIN_PATH"

      - name: Codesign app (optional)
        if: ${{ secrets.MAC_CERT_P12_BASE64 != '' }}
        run: |
          /usr/bin/codesign --force --deep --options runtime --sign "${{ secrets.MAC_CERT_NAME }}" "AgentBuddy.app"
          /usr/bin/codesign --verify --deep --strict "AgentBuddy.app"

      - name: Notarize app (optional)
        if: ${{ secrets.MAC_NOTARY_APPLE_ID != '' && secrets.MAC_NOTARY_PASSWORD != '' && secrets.MAC_NOTARY_TEAM_ID != '' }}
        run: |
          NOTARY_ZIP="AgentBuddy-notary.zip"
          ditto -c -k --sequesterRsrc --keepParent "AgentBuddy.app" "$NOTARY_ZIP"
          xcrun notarytool submit "$NOTARY_ZIP" \
            --apple-id "${{ secrets.MAC_NOTARY_APPLE_ID }}" \
            --password "${{ secrets.MAC_NOTARY_PASSWORD }}" \
            --team-id "${{ secrets.MAC_NOTARY_TEAM_ID }}" \
            --wait
          xcrun stapler staple "AgentBuddy.app"

      - name: Zip artifact
        run: |
          RID="${{ matrix.rid }}"
          ZIP_NAME="AgentBuddy-macos-$RID.zip"
          ditto -c -k --sequesterRsrc --keepParent "AgentBuddy.app" "$ZIP_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentBuddy-macos-${{ matrix.rid }}
          path: AgentBuddy-macos-${{ matrix.rid }}.zip

  build-linux:
    name: Build Linux (${{ matrix.rid }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [linux-x64, linux-arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RID="${{ matrix.rid }}"
          dotnet publish -c Release -r "$RID" --self-contained true \
            -p:Version="$VERSION" -p:AssemblyVersion="$VERSION.0" -p:FileVersion="$VERSION.0" -p:InformationalVersion="$VERSION"

      - name: Tar artifact
        run: |
          RID="${{ matrix.rid }}"
          PUBLISH_DIR="bin/Release/net10.0/$RID/publish"
          TAR_NAME="AgentBuddy-$RID.tar.gz"
          tar -czf "$TAR_NAME" -C "$PUBLISH_DIR" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentBuddy-${{ matrix.rid }}
          path: AgentBuddy-${{ matrix.rid }}.tar.gz

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ⚠️ **Unsigned Builds**

            These builds are unsigned, so Windows/macOS will show a warning the first time you open them.
            Follow the quick steps here:
            - docs/UNSIGNED_INSTALL.md

          files: |
            dist/AgentBuddy-win-x64/AgentBuddy-win-x64.zip
            dist/AgentBuddy-win-x86/AgentBuddy-win-x86.zip
            dist/AgentBuddy-macos-osx-arm64/AgentBuddy-macos-osx-arm64.zip
            dist/AgentBuddy-macos-osx-x64/AgentBuddy-macos-osx-x64.zip
            dist/AgentBuddy-linux-x64/AgentBuddy-linux-x64.tar.gz
            dist/AgentBuddy-linux-arm64/AgentBuddy-linux-arm64.tar.gz
